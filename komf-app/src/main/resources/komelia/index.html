<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komelia</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #ComposeTarget {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ponytail: Skiko 0.144.5 needs WEBGL_debug_renderer_info, which modern browsers
        // disable for privacy. Stub the extension and the vendor/renderer queries so
        // Skia's GL DirectContext creation doesn't abort on INVALID_ENUM.
        (function () {
            const UNMASKED_VENDOR_WEBGL = 0x9245;
            const UNMASKED_RENDERER_WEBGL = 0x9246;

            function patchGl(gl) {
                if (!gl || gl.__komeliaSkikoPatched) return;
                gl.__komeliaSkikoPatched = true;

                const originalGetExtension = gl.getExtension.bind(gl);
                gl.getExtension = function (name) {
                    if (name === 'WEBGL_debug_renderer_info') {
                        return {
                            UNMASKED_VENDOR_WEBGL: UNMASKED_VENDOR_WEBGL,
                            UNMASKED_RENDERER_WEBGL: UNMASKED_RENDERER_WEBGL
                        };
                    }
                    return originalGetExtension(name);
                };

                const originalGetParameter = gl.getParameter.bind(gl);
                gl.getParameter = function (pname) {
                    if (pname === UNMASKED_VENDOR_WEBGL) return 'unknown';
                    if (pname === UNMASKED_RENDERER_WEBGL) return 'unknown';
                    return originalGetParameter(pname);
                };
            }

            const originalGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function (type, attrs) {
                const ctx = originalGetContext.call(this, type, attrs);
                if (ctx && (type === 'webgl' || type === 'webgl2')) {
                    patchGl(ctx);
                }
                return ctx;
            };
        })();
    </script>
    <script>
        // ponytail: ComposeViewport/Skiko creates the WebGL surface from the canvas
        // drawing-buffer size. If the canvas attributes stay at the default 300x150
        // while CSS sizes it to the viewport, Skia renders into the wrong coordinate
        // space and the result is blank. Sync the attributes to the CSS size before
        // the app starts and keep them in sync on resize.
        function resizeCanvas() {
            const canvas = document.getElementById('ComposeTarget');
            if (!canvas) return;
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width));
            const height = Math.max(1, Math.floor(rect.height));
            if (canvas.width !== width) canvas.width = width;
            if (canvas.height !== height) canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', resizeCanvas);
    </script>
</head>
<body>
<canvas id="ComposeTarget"></canvas>
<script type="application/javascript" src="komelia-app.js" defer></script>
</body>
</html>
